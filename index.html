<div class="bg-emerald-900 p-4 rounded-xl mb-6 text-white">
    <label class="block text-xs font-bold uppercase mb-2">My Hardiness Zone</label>
    <select id="user-zone" onchange="saveZone()" class="w-full p-2 rounded-lg text-emerald-900">
        <option value="">Select your zone...</option>
        <option value="6">Zone 6</option>
        <option value="7">Zone 7</option>
        <option value="8">Zone 8</option>
    </select>
</div>

<script>
    // Updated Database with Zone Support
    const plantDatabase = {
        "Tomato": { sunlight: "Full Sun", zones: [6, 7, 8], companions: ["Basil", "Marigold"] },
        "Kale": { sunlight: "Partial to Full", zones: [3, 4, 5, 6, 7], companions: ["Onions", "Beets"] },
        "Lavender": { sunlight: "Full Sun", zones: [5, 6, 7, 8], companions: ["Rosemary", "Thyme"] }
    };

    // Load saved zone from localStorage
    window.onload = () => {
        const savedZone = localStorage.getItem('userZone');
        if(savedZone) {
            document.getElementById('user-zone').value = savedZone;
            updatePlantList();
        }
    };

    function saveZone() {
        const zone = document.getElementById('user-zone').value;
        localStorage.setItem('userZone', zone);
        updatePlantList(); // Refresh the dropdown when zone changes
    }

    function updatePlantList() {
        const userZone = parseInt(document.getElementById('user-zone').value);
        const dropdown = document.getElementById('p-select');
        
        // Clear current options
        dropdown.innerHTML = '<option value="">Select a plant...</option>';
        
        // Filter and add plants
        Object.keys(plantDatabase).forEach(plant => {
            // If no zone selected, show all. If zone selected, check compatibility.
            if (!userZone || plantDatabase[plant].zones.includes(userZone)) {
                let opt = document.createElement('option');
                opt.value = plant;
                opt.innerHTML = plant;
                dropdown.appendChild(opt);
            }
        });
    }
</script>
