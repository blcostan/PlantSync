<div class="bg-white p-6 rounded-3xl border border-emerald-100 shadow-sm mb-8">
    <h2 class="font-bold text-stone-800 mb-4">Add a new plant</h2>
    
    <select id="p-select" onchange="showCompanionTips()" class="w-full p-4 rounded-xl border border-stone-200 mb-4">
        <option value="">Select a plant...</option>
    </select>

    <div id="companion-box" class="hidden bg-emerald-50 border border-emerald-100 p-4 rounded-xl mb-4 text-sm text-emerald-900">
        <p id="tips-text"></p>
    </div>

    <button onclick="addPlant()" class="w-full bg-emerald-600 text-white font-bold p-4 rounded-xl hover:bg-emerald-700 transition">Add to Garden</button>
</div>

<script>
    // Updated Database with Companions
    const plantDatabase = {
        "Tomato": { zones: [6, 7, 8], companions: ["Basil", "Marigold", "Carrots"] },
        "Kale": { zones: [3, 4, 5, 6, 7], companions: ["Onions", "Beets", "Celery"] },
        "Lavender": { zones: [5, 6, 7, 8], companions: ["Rosemary", "Thyme", "Oregano"] },
        "Carrots": { zones: [4, 5, 6, 7, 8], companions: ["Tomatoes", "Onions", "Leeks"] }
    };

    // NEW: Show tips when plant is selected
    function showCompanionTips() {
        const plantName = document.getElementById('p-select').value;
        const box = document.getElementById('companion-box');
        const text = document.getElementById('tips-text');
        
        if (plantName && plantDatabase[plantName]) {
            box.classList.remove('hidden');
            const data = plantDatabase[plantName];
            text.innerHTML = `<strong>Best companions for ${plantName}:</strong><br>${data.companions.join(", ")}`;
        } else {
            box.classList.add('hidden');
        }
    }

    // Updated updatePlantList to clear tips if zone changes
    function updatePlantList() {
        const zone = document.getElementById('user-zone').value;
        localStorage.setItem('userZone', zone);
        document.getElementById('companion-box').classList.add('hidden'); // Reset tips
        
        const dropdown = document.getElementById('p-select');
        dropdown.innerHTML = '<option value="">Select a plant...</option>';
        
        Object.keys(plantDatabase).forEach(plant => {
            if (!zone || plantDatabase[plant].zones.includes(parseInt(zone))) {
                const opt = document.createElement('option');
                opt.value = plant;
                opt.innerHTML = plant;
                dropdown.appendChild(opt);
            }
        });
    }

    // (Keep the rest of your renderGarden and addPlant functions as they were)
</script>
