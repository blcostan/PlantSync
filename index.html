<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Wizard - Smart Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen p-6">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-[2rem] shadow-2xl border border-stone-100">
        <div class="mb-8 border-b border-stone-100 pb-6">
            <h1 class="text-4xl font-black text-emerald-900">Garden Wizard</h1>
            <p class="text-stone-500 mt-2">Filter plants by your zone, sun, and soil conditions.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <select id="s-zone" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none">
                <option value="">Any Zone</option>
            </select>
            
            <select id="s-sun" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none">
                <option value="">Any Sun Level</option>
                <option value="Full Sun">Full Sun</option>
                <option value="Partial Sun">Partial Sun</option>
                <option value="Shade">Shade</option>
            </select>

            <select id="s-soil" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none">
                <option value="">Any Soil Type</option>
                <option value="Loam">Loam</option>
                <option value="Clay">Clay</option>
                <option value="Sand">Sand</option>
            </select>

            <button onclick="findPlants()" class="bg-emerald-700 text-white font-bold p-4 rounded-xl hover:bg-emerald-800 transition shadow-lg shadow-emerald-200 active:scale-95">Find Plants</button>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full py-10 text-center text-stone-400">
                Select your parameters and click "Find Plants" to begin.
            </div>
        </div>
    </div>

<script>
    // 1. Populate Zone Dropdown
    const zoneSelect = document.getElementById('s-zone');
    for(let i=1; i<=13; i++) {
        zoneSelect.innerHTML += `<option value="${i}">Zone ${i}</option>`;
    }

    // 2. The Plant Database
    const plantDatabase = [
        { name: "Bee Balm", minZ: 4, maxZ: 9, sun: "Partial Sun", soil: "Loam", tips: "Loves moist, rich soil." },
        { name: "Lavender", minZ: 5, maxZ: 9, sun: "Full Sun", soil: "Sand", tips: "Needs excellent drainage." },
        { name: "Sunflower", minZ: 3, maxZ: 10, sun: "Full Sun", soil: "Loam", tips: "Heavy feeder, needs sun." },
        { name: "Coneflower (Echinacea)", minZ: 3, maxZ: 9, sun: "Full Sun", soil: "Loam", tips: "Drought tolerant once established." },
        { name: "Catnip", minZ: 3, maxZ: 9, sun: "Partial Sun", soil: "Loam", tips: "Very hardy and vigorous." },
        { name: "Sage", minZ: 5, maxZ: 9, sun: "Full Sun", soil: "Sand", tips: "Prefers leaner soil." },
        { name: "Thyme", minZ: 5, maxZ: 9, sun: "Full Sun", soil: "Sand", tips: "Great for rock gardens." },
        { name: "Goldenrod", minZ: 3, maxZ: 9, sun: "Full Sun", soil: "Loam", tips: "Late season nectar source." },
        { name: "Sedum", minZ: 3, maxZ: 10, sun: "Full Sun", soil: "Sand", tips: "Very low water needs." },
        { name: "Hyssop", minZ: 4, maxZ: 9, sun: "Full Sun", soil: "Loam", tips: "Attracts bees and hummingbirds." }
    ];

    // 3. Search & Render Logic
    function findPlants() {
        const z = parseInt(document.getElementById('s-zone').value);
        const sun = document.getElementById('s-sun').value;
        const soil = document.getElementById('s-soil').value;

        const results = plantDatabase.filter(p => {
            const zMatch = isNaN(z) || (z >= p.minZ && z <= p.maxZ);
            const sunMatch = !sun || p.sun === sun;
            const soilMatch = !soil || p.soil === soil;
            return zMatch && sunMatch && soilMatch;
        });

        const resultsDiv = document.getElementById('results');
        
        if (results.length === 0) {
            resultsDiv.innerHTML = '<div class="col-span-full py-10 text-center text-stone-500">No plants match those specific conditions. Try loosening your filters!</div>';
        } else {
            resultsDiv.innerHTML = results.map(p => `
                <div class="p-6 bg-white rounded-2xl border border-emerald-50 shadow-sm hover:shadow-md transition">
                    <h3 class="font-bold text-lg text-emerald-900">${p.name}</h3>
                    <div class="flex gap-2 text-xs font-semibold uppercase tracking-wider text-emerald-600 mt-2">
                        <span>☀️ ${p.sun}</span>
                        <span>🌱 ${p.soil}</span>
                    </div>
                    <p class="text-sm text-stone-600 mt-3 italic">${p.tips}</p>
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
