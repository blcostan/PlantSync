<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantSync | Plant Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="bg-stone-50 min-h-screen p-6">

<div class="max-w-6xl mx-auto bg-white p-8 rounded-[2rem] shadow-2xl border border-stone-100">
    <div class="mb-8 border-b border-stone-100 pb-6 text-center md:text-left">
        <h1 class="text-4xl font-black text-emerald-900">PlantSync</h1>
        <p class="text-stone-500 mt-2">Find the perfect plants for your specific conditions.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">
        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Hardiness Zone</label>
            <select id="s-zone" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Zone</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Location</label>
            <select id="s-region" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Anywhere</option>
                <option value="AL">Alabama</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="MS">Mississippi</option>
                <option value="NC">North Carolina</option>
                <option value="SC">South Carolina</option>
                <option value="TN">Tennessee</option>
            </select>
        </div>
        
        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Sunlight</label>
            <select id="s-sun" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Sun</option>
                <option value="Full Sun">Full Sun</option>
                <option value="Part Shade">Part Shade</option>
                <option value="Full Shade">Full Shade</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Soil Type</label>
            <select id="s-soil" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Soil</option>
                <option value="Sand">Sand</option>
                <option value="Loam">Loam</option>
                <option value="Clay">Clay</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Growth Habit</label>
            <select id="s-habit" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Category</option>
                <option value="Tree">Tree</option>
                <option value="Shrub">Shrub</option>
                <option value="Herb">Herb</option>
            </select>
        </div>
    </div>
    
    <button onclick="findplants()" class="w-full bg-emerald-700 text-white font-bold p-4 rounded-xl hover:bg-emerald-800 transition shadow-lg active:scale-95 text-lg">
        ✨ Find My Plants
    </button>

    <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-12">
        <p class="col-span-full text-center text-stone-400 py-10">Select parameters to begin.</p>
    </div>
</div>

<script>
    const supabaseUrl = 'https://trsllhyggngbnorfcdip.supabase.co';
    const supabaseKey = 'sb_publishable_k6e3Uu9GYAtWv1FNDuZQLg_zFJHX9Kz';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const zoneSelect = document.getElementById('s-zone');
    for(let i=1; i<=13; i++) {
        const opt = document.createElement('option');
        opt.value = i; opt.innerHTML = `Zone ${i}`;
        zoneSelect.appendChild(opt);
    }
async function findplants() {
    const resultsDiv = document.getElementById('results');
    const z = parseInt(document.getElementById('s-zone').value);
    const region = document.getElementById('s-region').value;
    const sun = document.getElementById('s-sun').value;
    const soil = document.getElementById('s-soil').value;
    const habit = document.getElementById('s-habit').value; 

    resultsDiv.innerHTML = `<p class="col-span-full text-center py-10 text-emerald-600 animate-pulse">Scanning database...</p>`;

    try {
        // We cast the JSONB columns to TEXT during the search to prevent the "Syntax Error"
        let query = _supabase.from('plants').select('*');

        if (!isNaN(z)) query = query.lte('zone_min', z).gte('zone_max', z);
        if (habit) query = query.eq('growth_habit', habit);
        
        // Using .ilike allows us to search text even if the database thinks it's JSON
        if (region) query = query.ilike('native_regions', `%${region}%`);
        if (sun) query = query.ilike('sunlight_tags', `%${sun}%`);
        if (soil) query = query.ilike('soil_types', `%${soil}%`);

        const { data: plants, error } = await query;
        if (error) throw error;

        if (plants && plants.length > 0) {
            resultsDiv.innerHTML = plants.map(p => {
                const rawImg = (p.image_url || "").trim().replace(/\s/g, '_');
                const imgUrl = rawImg ? `https://commons.wikimedia.org/w/index.php?title=Special:Redirect/file/${encodeURIComponent(rawImg)}&width=500` : 'https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=400';
                
                // This cleans the display text even if it has [" "] or extra quotes
                const formatList = (val) => {
                    if (!val) return '';
                    let str = typeof val === 'string' ? val : JSON.stringify(val);
                    return str.replace(/[\[\]"']/g, '').replace(/,,/g, ',').trim();
                };

                return `
                <div class="bg-white rounded-3xl border border-stone-100 shadow-sm overflow-hidden flex flex-col h-full">
                    <div class="h-48 bg-stone-200">
                        <img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=400';" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <div class="flex justify-between text-[10px] font-bold text-emerald-600 mb-1 uppercase tracking-wider">
                            <span>${p.growth_habit || 'Plant'}</span>
                            <span class="text-stone-400">${formatList(p.native_regions)}</span>
                        </div>
                        <h3 class="font-bold text-xl text-stone-900 leading-tight mb-1">${p.common_name}</h3>
                        <p class="text-sm italic text-stone-400 mb-4">${p.scientific_name || ''}</p>
                        <div class="mt-auto flex gap-2">
                            <span class="px-2 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold rounded uppercase">Zone ${p.zone_min}-${p.zone_max}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        } else {
            resultsDiv.innerHTML = `<p class="col-span-full text-center py-20 text-stone-400">No plants found matching those criteria.</p>`;
        }
    } catch (err) {
        console.error("Full Error Context:", err);
        resultsDiv.innerHTML = `<div class="col-span-full text-center text-red-500 bg-red-50 p-6 rounded-xl font-mono text-xs border border-red-100">
            <strong>SYSTEM ERROR:</strong><br>${err.message}
        </div>`;
    }
}

</script>
</body>
</html>
