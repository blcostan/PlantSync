<div class="bg-white p-8 rounded-3xl border border-stone-100 shadow-xl">
    <h2 class="text-2xl font-bold text-emerald-900 mb-6">Garden Wizard</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <select id="s-zone" class="p-3 border rounded-xl">
            <option value="">Zone (All)</option>
            <option value="6">Zone 6</option><option value="7">Zone 7</option><option value="8">Zone 8</option>
        </select>
        <select id="s-sun" class="p-3 border rounded-xl">
            <option value="">Sunlight (All)</option>
            <option value="Full Sun">Full Sun</option><option value="Partial">Partial</option>
        </select>
        <select id="s-soil" class="p-3 border rounded-xl">
            <option value="">Soil (All)</option>
            <option value="Loam">Loam</option><option value="Sandy">Sandy</option>
        </select>
        <button onclick="findPlants()" class="bg-emerald-600 text-white font-bold p-3 rounded-xl hover:bg-emerald-700">Find Plants</button>
    </div>

    <div id="results" class="space-y-3">
        </div>
</div>

<script>
    // The Database: Now structured for filtering
    const plantDatabase = [
        { name: "Tomato", zone: 7, sun: "Full Sun", soil: "Loam", tips: "Needs 6+ hours sun" },
        { name: "Kale", zone: 6, sun: "Partial", soil: "Loam", tips: "Good for cool weather" },
        { name: "Lavender", zone: 8, sun: "Full Sun", soil: "Sandy", tips: "Low water" }
    ];

    function findPlants() {
        const z = document.getElementById('s-zone').value;
        const sun = document.getElementById('s-sun').value;
        const soil = document.getElementById('s-soil').value;

        const results = plantDatabase.filter(p => {
            // Only filter if the user actually selected something
            return (!z || p.zone == z) && 
                   (!sun || p.sun == sun) && 
                   (!soil || p.soil == soil);
        });

        const list = document.getElementById('results');
        list.innerHTML = results.length > 0 
            ? results.map(p => `
                <div class="p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                    <h3 class="font-bold text-emerald-900">${p.name}</h3>
                    <p class="text-sm text-emerald-700">${p.tips}</p>
                </div>`).join('')
            : '<p class="text-stone-400">No plants found matching those specific conditions.</p>';
    }
</script>
