<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Wizard | Plant Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen p-6">

<div class="max-w-5xl mx-auto bg-white p-8 rounded-[2rem] shadow-2xl border border-stone-100">
    <div class="mb-8 border-b border-stone-100 pb-6 text-center md:text-left">
        <h1 class="text-4xl font-black text-emerald-900">Garden Wizard</h1>
        <p class="text-stone-500 mt-2">Find the perfect plants for your specific Raleigh conditions.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Hardiness Zone</label>
            <select id="s-zone" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Zone</option>
            </select>
        </div>
        
        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Sunlight Exposure</label>
            <select id="s-sun" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Sun Level</option>
                <option value="Full Sun">Full Sun</option>
                <option value="Part Shade">Part Shade</option>
                <option value="Full Shade">Full Shade</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Soil Type</label>
            <select id="s-soil" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Soil Type</option>
                <option value="Sand">Sand</option>
                <option value="Loam">Loam</option>
                <option value="Clay">Clay</option>
                <option value="Any">Any Soil</option>
            </select>
        </div>
    </div>
    
    <button onclick="findplants()" class="w-full bg-emerald-700 text-white font-bold p-4 rounded-xl hover:bg-emerald-800 transition shadow-lg shadow-emerald-200 active:scale-95 text-lg">
        ✨ Find My Plants
    </button>

    <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-12">
        <p class="col-span-full text-center text-stone-400 py-10">Select your parameters above to see results from your database.</p>
    </div>
</div>

<script>
    // 1. Initialize Supabase
    const supabaseUrl = 'https://trsllhyggngbnorfcdip.supabase.co';
    const supabaseKey = 'sb_publishable_k6e3Uu9GYAtWv1FNDuZQLg_zFJHX9Kz';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. Populate Zones 1-13
    const zoneSelect = document.getElementById('s-zone');
    for(let i=1; i<=13; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = `Zone ${i}`;
        zoneSelect.appendChild(opt);
    }

    // 3. Search Logic
    async function findplants() {
        const z = parseInt(document.getElementById('s-zone').value);
        const sun = document.getElementById('s-sun').value;
        const soil = document.getElementById('s-soil').value;

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `
            <div class="col-span-full text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-stone-500">Checking the garden...</p>
            </div>`;

        try {
            // We use .select('*') to see EVERY column name available
            let query = _supabase
                .from('plants')
                .select('*');

            if (!isNaN(z)) {
                query = query.lte('zone_min', z).gte('zone_max', z);
            }
            if (sun) {
                query = query.contains('sunlight_tags', [sun]);
            }
            if (soil) {
                query = query.contains('soil_types', [soil]);
            }

            const { data: plants, error } = await query;
            if (error) throw error;

            // --- THE TRUTH DETECTOR ---
            // Press F12 in your browser to see exactly what Supabase sent back
            console.log("FIRST PLANT DATA:", plants[0]); 

            if (plants && plants.length > 0) {
                resultsDiv.innerHTML = plants.map(p => {
                    // This checks multiple possible column names just in case
                    const imgSource = p.image_url || p.Image_URL || p.photo || p.image;
                    const fallback = 'https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=400';

                    return `
                    <div class="bg-white rounded-3xl border border-stone-100 shadow-sm hover:shadow-xl transition-all overflow-hidden group">
                        <div class="relative h-48 overflow-hidden bg-stone-200">
                            <img src="${imgSource ? imgSource.trim() : fallback}" 
                                 onload="console.log('Loaded: ' + p.common_name)"
                                 onerror="this.src='${fallback}'; console.log('Failed image for: ' + p.common_name)"
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" 
                                 alt="${p.common_name}">
                            <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-emerald-800">
                                ${p.growth_habit || 'Plant'}
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold text-xl text-stone-900">${p.common_name}</h3>
                            <p class="text-sm italic text-stone-400 mb-4">${p.scientific_name}</p>
                            
                            <div class="flex flex-wrap gap-2 mb-4">
                                <span class="px-2 py-1 bg-blue-50 text-blue-700 text-[10px] font-bold rounded-md uppercase">Zone ${p.zone_min}-${p.zone_max}</span>
                                <span class="px-2 py-1 bg-amber-50 text-amber-700 text-[10px] font-bold rounded-md uppercase">${p.moisture_needs || 'Moderate'} Water</span>
                            </div>

                            <div class="border-t border-stone-50 pt-4">
                                <p class="text-[11px] text-stone-400 uppercase font-bold tracking-tighter">Sunlight Preference</p>
                                <p class="text-sm text-stone-600">${p.sunlight_tags ? p.sunlight_tags.join(', ') : 'Varies'}</p>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } else {
                resultsDiv.innerHTML = `
                    <div class="col-span-full text-center py-20 bg-stone-50 rounded-3xl border-2 border-dashed border-stone-200">
                        <p class="text-stone-400 font-medium">No plants match these exact conditions.</p>
                        <button onclick="location.reload()" class="mt-4 text-emerald-700 font-bold hover:underline">Clear all filters</button>
                    </div>`;
            }
        } catch (err) {
            console.error("Database Error:", err);
            resultsDiv.innerHTML = `<div class="col-span-full text-center py-10 text-red-500 font-bold">Database Error: ${err.message}</div>`;
        }
    }
</script>

</body>
</html>
