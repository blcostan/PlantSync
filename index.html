                <option value="Full Sun">Full Sun</option>
                <option value="Part Shade">Partial Canopy</option>
                <option value="Full Shade">Full Canopy</option>
            </select>
        </div>

                <option value="Tree">Canopy (Tree)</option>
                <option value="Shrub">Understory (Shrub)</option>
                <option value="Herb">Ground Cover (Herb)</option>
            </select>
        </div>
