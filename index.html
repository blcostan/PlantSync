<div class="max-w-4xl mx-auto p-8 bg-stone-50 rounded-3xl shadow-lg border border-stone-200">
    <h2 class="text-3xl font-extrabold text-emerald-900 mb-2">Garden Wizard</h2>
    <p class="text-stone-600 mb-8">Select your conditions to find the perfect crops for your climate.</p>
    
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <select id="s-zone" class="p-4 rounded-xl border-2 border-emerald-100 focus:border-emerald-500 outline-none">
            <option value="">Any Zone</option>
        </select>
        <select id="s-sun" class="p-4 rounded-xl border-2 border-emerald-100 focus:border-emerald-500 outline-none">
            <option value="">Any Sun</option>
            <option value="Full Sun">Full Sun</option>
            <option value="Partial">Partial</option>
        </select>
        <select id="s-soil" class="p-4 rounded-xl border-2 border-emerald-100 focus:border-emerald-500 outline-none">
            <option value="">Any Soil</option>
            <option value="Loam">Loam</option>
            <option value="Sandy">Sandy</option>
        </select>
        <button onclick="findPlants()" class="bg-emerald-700 text-white font-bold p-4 rounded-xl hover:bg-emerald-800 transition">Find Plants</button>
    </div>

    <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
</div>

<script>
    // 1. DYNAMIC ZONE GENERATION
    const zoneSelect = document.getElementById('s-zone');
    for (let i = 1; i <= 13; i++) {
        zoneSelect.innerHTML += `<option value="${i}">Zone ${i}</option>`;
    }

    // 2. THE DATA (Move this to an external 'plants.json' file later)
    const plantDatabase = [
        { name: "Tomato", zone_min: 5, zone_max: 9, sun: "Full Sun", soil: "Loam", tips: "Classic favorite." },
        { name: "Lavender", zone_min: 5, zone_max: 9, sun: "Full Sun", soil: "Sandy", tips: "Drought tolerant." }
        // We will add your full list here!
    ];

    // 3. ROBUST FILTERING
    function findPlants() {
        const z = parseInt(document.getElementById('s-zone').value);
        const sun = document.getElementById('s-sun').value;
        const soil = document.getElementById('s-soil').value;

        const results = plantDatabase.filter(p => {
            const matchesZone = isNaN(z) || (z >= p.zone_min && z <= p.zone_max);
            const matchesSun = !sun || p.sun === sun;
            const matchesSoil = !soil || p.soil === soil;
            return matchesZone && matchesSun && matchesSoil;
        });

        document.getElementById('results').innerHTML = results.length > 0 
            ? results.map(p => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-emerald-50">
                    <h3 class="font-bold text-lg text-emerald-900">${p.name}</h3>
                    <p class="text-sm text-stone-600 mt-2">${p.tips}</p>
                </div>`).join('')
            : '<p class="col-span-full text-center text-stone-400 py-10">No matches found. Try widening your search!</p>';
    }
</script>
