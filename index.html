<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantSync | Restoration Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="bg-stone-100 min-h-screen p-4 md:p-8">

<div class="max-w-6xl mx-auto bg-white p-6 md:p-10 rounded-[2rem] shadow-2xl">
    
    <div class="mb-10 border-b border-stone-100 pb-8">
        <h1 class="text-4xl font-black text-emerald-950 italic">PlantSync <span class="text-emerald-500 not-italic font-light text-xl tracking-widest ml-2 uppercase">Restoration Pro</span></h1>
        <p class="text-stone-500 mt-2 font-medium">Ecological Analysis & Species Selection Tool</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
        <div>
            <label class="block text-[10px] font-black text-emerald-900 uppercase mb-2 tracking-widest">Site Hydrology</label>
            <select id="s-hydrology" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-200 font-semibold text-stone-700">
                <option value="">Any Hydrology</option>
                <option value="Wetland">Wetland (Hydric)</option>
                <option value="Mesic">Mesic (Moist)</option>
                <option value="Upland">Upland (Dry)</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-black text-emerald-900 uppercase mb-2 tracking-widest">Salt Tolerance</label>
            <select id="s-salt" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-200 font-semibold text-stone-700">
                <option value="">Any Tolerance</option>
                <option value="High">High (Salt Marsh)</option>
                <option value="Moderate">Moderate (Coastal)</option>
                <option value="Low/None">Low/None (Inland)</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-black text-emerald-900 uppercase mb-2 tracking-widest">Hardiness Zone</label>
            <select id="s-zone" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-200 font-semibold text-stone-700">
                <option value="">Any Zone</option>
                <option value="6">USDA Zone 6</option>
                <option value="7">USDA Zone 7</option>
                <option value="8">USDA Zone 8</option>
                <option value="9">USDA Zone 9</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-black text-emerald-900 uppercase mb-2 tracking-widest">Sunlight</label>
            <select id="s-sun" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-200 font-semibold text-stone-700">
                <option value="">Any Exposure</option>
                <option value="Full Sun">Full Sun</option>
                <option value="Part Shade">Part Shade</option>
                <option value="Full Shade">Full Shade</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-black text-emerald-900 uppercase mb-2 tracking-widest">Vegetative Stratum</label>
            <select id="s-habit" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-200 font-semibold text-stone-700">
                <option value="">All Strata</option>
                <option value="Tree">Canopy (Tree)</option>
                <option value="Shrub">Understory (Shrub)</option>
                <option value="Herb">Herbaceous (Wildflower/Fern)</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-black text-emerald-900 uppercase mb-2 tracking-widest">Soil Texture</label>
            <select id="s-soil" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-200 font-semibold text-stone-700">
                <option value="">Any Texture</option>
                <option value="Clay">Clay (Heavy)</option>
                <option value="Loam">Loam (Balanced)</option>
                <option value="Sand">Sand (Well-Drained)</option>
            </select>
        </div>
    </div>
    
    <button id="search-btn" class="w-full bg-emerald-800 text-white font-black py-5 rounded-2xl hover:bg-emerald-900 transition-all shadow-xl active:scale-[0.98] text-lg uppercase tracking-widest mb-16">
        ✨ Find Compatible Species
    </button>

    <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <p class="col-span-full text-center text-stone-400 py-20 font-medium italic border-2 border-dashed border-stone-100 rounded-3xl">Adjust filters and click search to analyze the database.</p>
    </div>
</div>

<script>
    const supabaseUrl = 'https://trsllhyggngbnorfcdip.supabase.co';
    const supabaseKey = 'sb_publishable_k6e3Uu9GYAtWv1FNDuZQLg_zFJHX9Kz';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function findplants() {
        const resultsDiv = document.getElementById('results');
        
        const hydro = document.getElementById('s-hydrology').value;
        const salt = document.getElementById('s-salt').value;
        const sun = document.getElementById('s-sun').value;
        const habit = document.getElementById('s-habit').value;
        const soil = document.getElementById('s-soil').value;
        const zValue = document.getElementById('s-zone').value;
        const z = zValue ? parseInt(zValue) : NaN;

        resultsDiv.innerHTML = '<div class="col-span-full text-center py-20 text-emerald-700 font-bold animate-pulse">ANALYZING DATABASE...</div>';

        try {
            let query = _supabase.from('plants').select('*');

            if (hydro) { query = query.or(`Hydrology.ilike.%${hydro}%,Hydrology.eq.Any`); }
            if (salt)  { query = query.eq('salt_tolerance', salt); }
            if (habit) { query = query.eq('growth_habit', habit); }
            if (soil)  { query = query.or(`soil_type.ilike.%${soil}%,soil_type.eq.Any`); }
            if (sun)   { query = query.ilike('sunlight_tags', `%${sun}%`); }
            
            if (!isNaN(z)) {
                query = query.lte('zone_min', z).gte('zone_max', z);
            }

            const { data: plants, error } = await query;
            if (error) throw error;

            if (plants && plants.length > 0) {
                resultsDiv.innerHTML = plants.map(p => {
                    const rawImg = (p.image_url || "").trim().replace(/\s/g, '_');
                    const imgUrl = rawImg ? `https://commons.wikimedia.org/w/index.php?title=Special:Redirect/file/${encodeURIComponent(rawImg)}&width=500` : 'https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=400';

                    let warningHTML = '';
                    const sName = p.scientific_name || "";
                    const riskList = [
                        { key: "Fraxinus", label: "Emerald Ash Borer" },
                        { key: "Ulmus", label: "Dutch Elm Disease" },
                        { key: "Cornus florida", label: "Dogwood Anthracnose" },
                        { key: "Sassafras", label: "Laurel Wilt Disease" },
                        { key: "Tsuga", label: "Hemlock Woolly Adelgid" },
                        { key: "Fagus", label: "Beech Leaf Disease" }
                    ];

                    riskList.forEach(risk => {
                        if (sName.includes(risk.key)) {
                            warningHTML = `<div class="bg-stone-700 text-white text-[9px] font-black px-3 py-1 uppercase tracking-tighter w-full text-center">⚠️ Risk: ${risk.label}</div>`;
                        }
                    });

                    return `
                    <div class="bg-white rounded-3xl border border-stone-100 shadow-sm overflow-hidden flex flex-col h-full hover:shadow-xl transition-all group relative">
                        ${warningHTML}
                        <div class="h-52 bg-stone-200">
                            <img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=400';">
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-between items-center text-[9px] font-black text-emerald-600 mb-3 uppercase tracking-widest">
                                <span>${p.growth_habit || 'Species'}</span>
                                <span class="px-2 py-1 bg-emerald-50 rounded-lg">Zone ${p.zone_min}-${p.zone_max}</span>
                            </div>
                            <h3 class="font-black text-xl text-stone-900 leading-tight mb-1">${p.common_name}</h3>
                            <p class="text-xs italic text-stone-400 mb-6 font-medium">${p.scientific_name}</p>
                            <div class="mt-auto grid grid-cols-2 gap-2 pt-4 border-t border-stone-50">
                                <div class="bg-stone-50 p-2 rounded-xl text-center">
                                    <p class="text-[8px] font-bold text-stone-400 uppercase">Hydrology</p>
                                    <p class="text-[10px] font-black text-emerald-800 uppercase">${p.Hydrology || 'Any'}</p>
                                </div>
                                <div class="bg-stone-50 p-2 rounded-xl text-center">
                                    <p class="text-[8px] font-bold text-stone-400 uppercase">Soil Texture</p>
                                    <p class="text-[10px] font-black text-emerald-800 uppercase">${p.soil_type || 'Any'}</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } else {
                resultsDiv.innerHTML = '<div class="col-span-full text-center py-20 text-stone-400 font-bold border-2 border-dashed border-stone-100 rounded-3xl">No species found matching those specific site conditions.</div>';
            }
        } catch (err) {
            resultsDiv.innerHTML = `<div class="col-span-full text-center text-red-500 p-10 font-mono text-xs">DATABASE ERROR: ${err.message}</div>`;
        }
    }

    document.getElementById('search-btn').addEventListener('click', findplants);
</script>

</body>
</html>
