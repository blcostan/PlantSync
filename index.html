<script>
    const supabaseUrl = 'https://trsllhyggngbnorfcdip.supabase.co';
    const supabaseKey = 'sb_publishable_k6e3Uu9GYAtWv1FNDuZQLg_zFJHX9Kz';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('search-btn').addEventListener('click', findplants);

    async function findplants() {
        const resultsDiv = document.getElementById('results');
        
        // Grab inputs
        const hydro = document.getElementById('s-hydrology').value;
        const salt = document.getElementById('s-salt').value;
        const sun = document.getElementById('s-sun').value;
        const habit = document.getElementById('s-habit').value;
        const soil = document.getElementById('s-soil').value;
        const zValue = document.getElementById('s-zone').value;
        const z = zValue ? parseInt(zValue) : NaN;

        console.log("Analysis started for:", { hydro, salt, sun, habit, soil, z });
        resultsDiv.innerHTML = `<div class="col-span-full text-center py-20 text-emerald-700 font-bold animate-pulse uppercase tracking-widest">Running Site Analysis...</div>`;

        try {
            let query = _supabase.from('plants').select('*');

            // Apply Filters one by one
            if (hydro) {
                // If this line fails, your column might be named something else
                query = query.or(`Hydrology.ilike.%${hydro}%,Hydrology.eq.Any`);
            }
            if (salt) {
                query = query.eq('salt_tolerance', salt);
            }
            if (habit) {
                query = query.eq('growth_habit', habit);
            }
            if (soil) {
                // If this line fails, check if your column is 'soil_type' or 'Soil'
                query = query.or(`soil_type.ilike.%${soil}%,soil_type.eq.Any`);
            }
            if (sun) {
                query = query.ilike('sunlight_tags', `%${sun}%`);
            }
            if (!isNaN(z)) {
                query = query.lte('zone_min', z).gte('zone_max', z);
            }

            const { data: plants, error } = await query;
            
            if (error) {
                console.error("Supabase Query Error:", error);
                throw error;
            }

            if (!plants || plants.length === 0) {
                resultsDiv.innerHTML = `<div class="col-span-full text-center py-20 text-stone-400 font-bold border-2 border-dashed border-stone-100 rounded-3xl">No species match these criteria. Try loosening your filters.</div>`;
                return;
            }

            resultsDiv.innerHTML = plants.map(p => {
                const rawImg = (p.image_url || "").trim().replace(/\s/g, '_');
                const imgUrl = rawImg ? `https://commons.wikimedia.org/w/index.php?title=Special:Redirect/file/${encodeURIComponent(rawImg)}&width=500` : 'https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=400';

                let warningHTML = '';
                const sName = p.scientific_name || "";
                if (sName.includes("Fraxinus")) warningHTML = alertBox("Emerald Ash Borer");
                else if (sName.includes("Ulmus")) warningHTML = alertBox("Dutch Elm Disease");
                else if (sName.includes("Cornus florida")) warningHTML = alertBox("Dogwood Anthracnose");
                else if (sName.includes("Sassafras")) warningHTML = alertBox("Laurel Wilt Disease");
                else if (sName.includes("Tsuga")) warningHTML = alertBox("Hemlock Woolly Adelgid");
                else if (sName.includes("Fagus")) warningHTML = alertBox("Beech Leaf Disease");

                return `
                <div class="bg-white rounded-3xl border border-stone-100 shadow-sm overflow-hidden flex flex-col h-full hover:shadow-xl transition-all group relative">
                    ${warningHTML}
                    <div class="h-52 bg-stone-200">
                        <img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=400';" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <div class="flex justify-between items-center text-[9px] font-black text-emerald-600 mb-3 uppercase tracking-widest">
                            <span>${p.growth_habit || 'Species'}</span>
                            <span class="px-2 py-1 bg-emerald-50 rounded-lg">Zone ${p.zone_min}-${p.zone_max}</span>
                        </div>
                        <h3 class="font-black text-xl text-stone-900 leading-tight mb-1">${p.common_name}</h3>
                        <p class="text-xs italic text-stone-400 mb-6 font-medium">${p.scientific_name}</p>
                        <div class="mt-auto grid grid-cols-2 gap-2 pt-4 border-t border-stone-50">
                            <div class="bg-stone-50 p-2 rounded-xl text-center">
                                <p class="text-[8px] font-bold text-stone-400 uppercase">Hydrology</p>
                                <p class="text-[10px] font-black text-emerald-800 uppercase">${p.Hydrology || 'Any'}</p>
                            </div>
                            <div class="bg-stone-50 p-2 rounded-xl text-center">
                                <p class="text-[8px] font-bold text-stone-400 uppercase">Soil Texture</p>
                                <p class="text-[10px] font-black text-emerald-800 uppercase">${p.soil_type || 'Any'}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

        } catch (err) {
            console.error("Critical System Error:", err);
            resultsDiv.innerHTML = `<div class="col-span-full text-center text-red-500 bg-red-50 p-6 rounded-2xl border border-red-100 font-mono text-xs"><strong>ANALYSIS FAILED:</strong><br>${err.message}<br><br>Check if your Supabase column names match 'Hydrology' and 'soil_type'.</div>`;
        }
    }

    function alertBox(name) {
        return `<div class="bg-stone-700 text-white text-[9px] font-black px-3 py-1 uppercase tracking-tighter w-full text-center">⚠️ Risk: ${name}</div>`;
    }
</script>
