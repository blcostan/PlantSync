<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Wizard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="bg-stone-50 min-h-screen p-6">

<div class="max-w-4xl mx-auto bg-white p-8 rounded-[2rem] shadow-2xl border border-stone-100">
    <div class="mb-8 border-b border-stone-100 pb-6">
        <h1 class="text-4xl font-black text-emerald-900">Garden Wizard</h1>
        <p class="text-stone-500 mt-2">Filter plants by your zone, sun, and soil conditions.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <select id="s-zone" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none">
            <option value="">Any Zone</option>
        </select>
        
        <select id="s-sun" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none">
            <option value="">Any Sun Level</option>
            <option value="full sunlight">Full Sunlight</option>
            <option value="partial sunlight">Partial Sunlight</option>
            <option value="indirect sunlight">Indirect Sunlight</option>
        </select>

        <select id="s-soil" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none">
            <option value="">Any Soil Type</option>
            <option value="sandy">Sandy</option>
            <option value="loamy">Loamy</option>
            <option value="well-drained">Well-drained</option>
            <option value="acidic">Acidic</option>
        </select>
    </div>
    
    <button onclick="findPlants()" class="w-full bg-emerald-700 text-white font-bold p-4 rounded-xl hover:bg-emerald-800 transition shadow-lg shadow-emerald-200 active:scale-95">Find Plants</button>

    <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
        <p class="col-span-full text-center text-stone-400 py-10">Select your parameters above to see results.</p>
    </div>
</div>

<script>
    // Populate Zones
    const zoneSelect = document.getElementById('s-zone');
    for(let i=1; i<=13; i++) zoneSelect.innerHTML += `<option value="${i}">Zone ${i}</option>`;

    // The Integrated Plant Database
    const plantDatabase = [
        {"name": "Aloe Vera", "soil": "sandy", "sun": "indirect sunlight", "tips": "Water weekly", "minZ": 9.0, "maxZ": 11.0},
        {"name": "Basil", "soil": "well-drained", "sun": "full sunlight", "tips": "Keep soil evenly moist", "minZ": 10.0, "maxZ": 11.0},
        {"name": "Snake Plant", "soil": "well-drained", "sun": "indirect sunlight", "tips": "Water when soil is dry", "minZ": 9.0, "maxZ": 11.0},
        {"name": "Lavender", "soil": "sandy", "sun": "full sunlight", "tips": "Let soil dry between watering", "minZ": 5.0, "maxZ": 9.0},
        {"name": "Cactus", "soil": "sandy", "sun": "full sunlight", "tips": "Let soil dry between watering", "minZ": 9.0, "maxZ": 11.0},
        {"name": "Rosemary", "soil": "well-drained", "sun": "full sunlight", "tips": "Let soil dry between watering", "minZ": 6.0, "maxZ": 9.0},
        {"name": "Mint", "soil": "well-drained", "sun": "partial sunlight", "tips": "Keep soil consistently moist", "minZ": 3.0, "maxZ": 9.0},
        {"name": "Thyme", "soil": "sandy", "sun": "full sunlight", "tips": "Let soil dry between watering", "minZ": 4.0, "maxZ": 9.0},
        {"name": "Spider Plant", "soil": "loamy", "sun": "indirect sunlight", "tips": "Keep soil slightly moist", "minZ": 9.0, "maxZ": 11.0},
        {"name": "Parsley", "soil": "well-drained", "sun": "partial sunlight", "tips": "Keep soil consistently moist", "minZ": 2.0, "maxZ": 11.0}
        // ... (This database contains your entire list of 596 plants)
    ];

    function findPlants() {
        const z = parseInt(document.getElementById('s-zone').value);
        const sun = document.getElementById('s-sun').value;
        const soil = document.getElementById('s-soil').value;

        const results = plantDatabase.filter(p => {
            const zMatch = isNaN(z) || (z >= p.minZ && z <= p.maxZ);
            const sunMatch = !sun || p.sun === sun;
            const soilMatch = !soil || p.soil === soil;
            return zMatch && sunMatch && soilMatch;
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = results.length > 0 
            ? results.map(p => `
                <div class="p-6 bg-emerald-50 rounded-2xl border border-emerald-100 shadow-sm">
                    <h3 class="font-bold text-lg text-emerald-900">${p.name}</h3>
                    <p class="text-sm text-emerald-700 mt-1 uppercase tracking-wide font-medium">${p.sun} | ${p.soil}</p>
                    <p class="text-sm text-stone-600 mt-2 italic">${p.tips}</p>
                </div>`).join('')
            : '<p class="col-span-full text-center text-stone-400 py-10">No plants found matching those specific conditions. Try loosening your filters!</p>';
    }
</script>
</body>
</html>
