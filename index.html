<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantSync | Plant Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen p-6">

<div class="max-w-6xl mx-auto bg-white p-8 rounded-[2rem] shadow-2xl border border-stone-100">
    <div class="mb-8 border-b border-stone-100 pb-6 text-center md:text-left">
        <h1 class="text-4xl font-black text-emerald-900">Garden Wizard</h1>
        <p class="text-stone-500 mt-2">Find the perfect plants for your specific conditions.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Hardiness Zone</label>
            <select id="s-zone" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Zone</option>
            </select>
        </div>
        
        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Sunlight Exposure</label>
            <select id="s-sun" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Sun Level</option>
                <option value="Full Sun">Full Sun</option>
                <option value="Part Shade">Part Shade</option>
                <option value="Full Shade">Full Shade</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Soil Type</label>
            <select id="s-soil" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Soil Type</option>
                <option value="Sand">Sand</option>
                <option value="Loam">Loam</option>
                <option value="Clay">Clay</option>
                <option value="Any">Any Soil</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-emerald-800 uppercase mb-2 ml-1">Growth Habit</label>
            <select id="s-habit" class="p-4 bg-stone-50 rounded-xl border border-stone-200 text-stone-700 w-full focus:ring-2 ring-emerald-500 outline-none transition-all">
                <option value="">Any Category</option>
                <option value="Tree">Tree</option>
                <option value="Shrub">Shrub</option>
                <option value="Herb">Herb</option>
                <option value="Vine">Vine</option>
            </select>
        </div>
    </div>
    
    <button onclick="findplants()" class="w-full bg-emerald-700 text-white font-bold p-4 rounded-xl hover:bg-emerald-800 transition shadow-lg shadow-emerald-200 active:scale-95 text-lg">
        ✨ Find My Plants
    </button>

    <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-12">
        <p class="col-span-full text-center text-stone-400 py-10">Select your parameters above to see results.</p>
    </div>
</div>

<script>
    const supabaseUrl = 'https://trsllhyggngbnorfcdip.supabase.co';
    const supabaseKey = 'sb_publishable_k6e3Uu9GYAtWv1FNDuZQLg_zFJHX9Kz';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Populate Zones 1-13
    const zoneSelect = document.getElementById('s-zone');
    for(let i=1; i<=13; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = `Zone ${i}`;
        zoneSelect.appendChild(opt);
    }

    async function findplants() {
        const z = parseInt(document.getElementById('s-zone').value);
        const sun = document.getElementById('s-sun').value;
        const soil = document.getElementById('s-soil').value;
        const habit = document.getElementById('s-habit').value; 
        const resultsDiv = document.getElementById('results');

        resultsDiv.innerHTML = `<div class="col-span-full text-center py-10"><p class="text-emerald-600 animate-pulse font-bold">Consulting the ancient scrolls...</p></div>`;

        try {
            let query = _supabase.from('plants').select('*');

            // Hardiness Zone
            if (!isNaN(z)) {
                query = query.lte('zone_min', z).gte('zone_max', z);
            }

            // Sunlight
            if (sun && sun !== "") {
                query = query.or(`sunlight_tags.cs.{"${sun}"},sunlight_tags.cs.{"Any"}`);
            }

            // Soil Type
            if (soil && soil !== "") {
                query = query.or(`soil_types.cs.{"${soil}"},soil_types.cs.{"Any"}`);
            }

            // Growth Habit (Now using your correct column name)
            if (habit && habit !== "") {
                query = query.eq('growth_habit', habit);
            }

            const { data: plants, error } = await query;
            if (error) throw error;

            if (plants && plants.length > 0) {
 resultsDiv.innerHTML = plants.map(p => {
    const rawName = (p.image_url || "").trim();
    const imgUrl = `https://commons.wikimedia.org/wiki/Special:FilePath/${rawName}?width=500`;
    const fallback = 'https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=400';

    return `
    <div class="bg-white rounded-3xl border border-stone-100 shadow-sm hover:shadow-xl transition-all overflow-hidden group">
        <div class="relative h-48 overflow-hidden bg-stone-200">
            <img src="${imgUrl}" 
                 onerror="this.src='${fallback}';" 
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
        </div>
        <div class="p-6">
            <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">${p.growth_habit || 'Plant'}</span>
            <h3 class="font-bold text-xl text-stone-900">${p.common_name}</h3>
            <p class="text-sm italic text-stone-400 mb-4">${p.scientific_name || ''}</p>
            <div class="flex flex-wrap gap-2">
                <span class="px-2 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold rounded-md uppercase">Zone ${p.zone_min}-${p.zone_max}</span>
                
                <span class="px-2 py-1 bg-blue-50 text-blue-700 text-[10px] font-bold rounded-md uppercase flex items-center">
                    <span class="mr-1">💧</span> ${p.moisture_needs || 'Unknown'}
                </span>
            </div>
        </div>
    </div>`;
}).join('');
            } else {
                resultsDiv.innerHTML = `<p class="col-span-full text-center py-20 text-stone-400">No ${habit}s match those specific conditions.</p>`;
            }
        } catch (err) {
            console.error(err);
            resultsDiv.innerHTML = `<div class="col-span-full text-center text-red-500 p-10 font-bold uppercase text-xs tracking-widest">Error: ${err.message}</div>`;
        }
    }
</script>
</body>
</html>
